<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 400" role="img" aria-labelledby="title desc">
  <title id="title">AssetIWeave</title>
  <desc id="desc">Local-first AI asset catalog and mount manager</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#070b14"/>
      <stop offset="0.55" stop-color="#0d1626"/>
      <stop offset="1" stop-color="#101d30"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#75a8f5"/>
      <stop offset="1" stop-color="#4bd3a1"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#5f8fd9" stop-opacity=".34"/>
      <stop offset="1" stop-color="#5f8fd9" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M32 0H0V32" fill="none" stroke="#b9d3ff" stroke-opacity=".07"/>
    </pattern>
    <filter id="soft-shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#02050b" flood-opacity=".55"/>
    </filter>
  </defs>

  <rect width="1280" height="400" rx="28" fill="url(#bg)"/>
  <rect width="1280" height="400" rx="28" fill="url(#grid)"/>
  <circle cx="887" cy="202" r="300" fill="url(#glow)"/>

  <g transform="translate(76 72)">
    <rect width="210" height="30" rx="15" fill="#18263b" stroke="#41638f"/>
    <circle cx="18" cy="15" r="5" fill="#4bd3a1"/>
    <text x="33" y="20" fill="#b9d3ff" font-family="SFMono-Regular,Consolas,monospace" font-size="12" font-weight="700" letter-spacing="1.6">LOCAL-FIRST</text>

    <text x="0" y="105" fill="#edf4ff" font-family="Avenir Next,Segoe UI,sans-serif" font-size="64" font-weight="700" letter-spacing="-2">AssetIWeave</text>
    <rect y="126" width="500" height="4" rx="2" fill="url(#accent)"/>
    <text x="0" y="170" fill="#c4cfe0" font-family="Avenir Next,Segoe UI,sans-serif" font-size="21">
      Discover, catalog, group and mount AI assets.
    </text>
    <text x="0" y="205" fill="#8799b5" font-family="SFMono-Regular,Consolas,monospace" font-size="14">
      SOURCES  /  CATALOG  /  GROUPS  /  APP MOUNTS  /  CLI
    </text>

    <g transform="translate(0 242)" font-family="SFMono-Regular,Consolas,monospace" font-size="12" font-weight="700">
      <rect width="122" height="34" rx="8" fill="#13253a" stroke="#315b84"/>
      <text x="18" y="22" fill="#9fc6ff">READ-ONLY</text>
      <rect x="136" width="132" height="34" rx="8" fill="#132b29" stroke="#2f7b63"/>
      <text x="154" y="22" fill="#79deb8">SINGLE-HOP</text>
      <rect x="282" width="122" height="34" rx="8" fill="#242038" stroke="#675c94"/>
      <text x="302" y="22" fill="#c6b8f0">DESKTOP+CLI</text>
    </g>
  </g>

  <g transform="translate(685 66)" filter="url(#soft-shadow)" font-family="SFMono-Regular,Consolas,monospace">
    <path d="M122 76C204 76 180 134 260 134M122 134H260M122 192C204 192 180 134 260 134" fill="none" stroke="#5f8fd9" stroke-width="2" stroke-opacity=".78"/>
    <path d="M376 134C430 134 426 62 486 62M376 134H486M376 134C430 134 426 206 486 206M376 134C430 134 426 278 486 278" fill="none" stroke="#4bd3a1" stroke-width="2" stroke-opacity=".72"/>

    <g font-size="12" font-weight="700">
      <rect x="0" y="52" width="122" height="48" rx="10" fill="#15243a" stroke="#436b9e"/>
      <circle cx="20" cy="76" r="6" fill="#75a8f5"/>
      <text x="34" y="80" fill="#d9e7fb">LOCAL DIRS</text>

      <rect x="0" y="110" width="122" height="48" rx="10" fill="#15243a" stroke="#436b9e"/>
      <circle cx="20" cy="134" r="6" fill="#75a8f5"/>
      <text x="34" y="138" fill="#d9e7fb">GIT REPOS</text>

      <rect x="0" y="168" width="122" height="48" rx="10" fill="#15243a" stroke="#436b9e"/>
      <circle cx="20" cy="192" r="6" fill="#75a8f5"/>
      <text x="34" y="196" fill="#d9e7fb">APP TARGETS</text>

      <rect x="260" y="86" width="116" height="96" rx="18" fill="#182b42" stroke="#75a8f5" stroke-width="2"/>
      <circle cx="318" cy="120" r="16" fill="#75a8f5" fill-opacity=".18" stroke="#75a8f5"/>
      <path d="M310 120h16M318 112v16" stroke="#b9d3ff" stroke-width="2" stroke-linecap="round"/>
      <text x="281" y="160" fill="#edf4ff">CATALOG</text>

      <rect x="486" y="38" width="96" height="48" rx="10" fill="#142b28" stroke="#3b8b70"/>
      <text x="509" y="66" fill="#a3e9cd">CODEX</text>
      <rect x="486" y="110" width="96" height="48" rx="10" fill="#142b28" stroke="#3b8b70"/>
      <text x="506" y="138" fill="#a3e9cd">CLAUDE</text>
      <rect x="486" y="182" width="96" height="48" rx="10" fill="#142b28" stroke="#3b8b70"/>
      <text x="506" y="210" fill="#a3e9cd">CURSOR</text>
      <rect x="486" y="254" width="96" height="48" rx="10" fill="#142b28" stroke="#3b8b70"/>
      <text x="506" y="282" fill="#a3e9cd">CUSTOM</text>
    </g>

    <text x="210" y="236" fill="#7186a5" font-size="11" letter-spacing="1.2">SQLITE + MOUNT RELATIONS</text>
    <text x="330" y="326" fill="#7186a5" font-size="11" letter-spacing="1.2">DIRECT SYMLINK PROJECTION</text>
  </g>
</svg>
