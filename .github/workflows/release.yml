name: Release

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Git tag to release
        required: true
        default: v0.1.1
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}

jobs:
  release-preflight:
    name: Release preflight
    runs-on: ubuntu-22.04
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify release version and signing key
        shell: bash
        run: |
          set -euo pipefail
          node scripts/release-audit.js --static-only
          app_version="$(node -p "require('./package.json').version")"
          tauri_version="$(node -p "require('./src-tauri/tauri.conf.json').version")"
          contract_engine_version="$(node -p "require('./cli/internal/schema/contract.json').engine_version")"
          engine_version="$(sed -n '/^\[package\]/,/^\[/s/^version = "\(.*\)"/\1/p' src-tauri/Cargo.toml | head -n 1)"
          expected_tag="v${app_version}"
          if [[ "$RELEASE_TAG" != "$expected_tag" ]]; then
            echo "::error::Release tag $RELEASE_TAG does not match application version $expected_tag"
            exit 1
          fi
          if [[ "$engine_version" != "$app_version" || "$tauri_version" != "$app_version" || "$contract_engine_version" != "$app_version" ]]; then
            echo "::error::package.json, src-tauri/Cargo.toml, tauri.conf.json, and the embedded CLI contract must share version $app_version"
            exit 1
          fi
          if [[ -z "$TAURI_SIGNING_PRIVATE_KEY" ]]; then
            echo "::error::TAURI_SIGNING_PRIVATE_KEY repository secret is required"
            exit 1
          fi

      - name: Create draft release
        shell: bash
        run: |
          set -euo pipefail
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            release_json="$(gh release view "$RELEASE_TAG" --json assets,isDraft)"
            is_draft="$(jq -r .isDraft <<<"$release_json")"
            asset_count="$(jq '.assets | length' <<<"$release_json")"
            if [[ "$is_draft" != "true" ]]; then
              if (( asset_count == 0 )); then
                gh release edit "$RELEASE_TAG" --draft
                exit 0
              fi
              echo "::error::Release $RELEASE_TAG already exists and is not a draft"
              exit 1
            fi
            exit 0
          fi
          gh release create "$RELEASE_TAG" \
            --verify-tag \
            --draft \
            --title "AssetIWeave $RELEASE_TAG" \
            --notes "CLI tools are bundled with the desktop app and can be installed into PATH from Settings. Release installers are limited to Windows x64 NSIS exe, macOS x64/aarch64 dmg, and Linux AppImage/deb. Update artifacts are signed for the in-app updater. macOS and Windows may still show an extra trust prompt until OS code signing is configured." \
            --generate-notes

  desktop-installers:
    name: Desktop installer (${{ matrix.label }})
    needs: release-preflight
    runs-on: ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: Linux x64
            platform: ubuntu-22.04
            rust_target: ""
            args: "--bundles appimage,deb"
          - label: Windows x64
            platform: windows-latest
            rust_target: ""
            args: "--bundles nsis"
          - label: macOS arm64
            platform: macos-latest
            rust_target: aarch64-apple-darwin
            args: "--target aarch64-apple-darwin --bundles app,dmg"
          - label: macOS x64
            platform: macos-15-intel
            rust_target: x86_64-apple-darwin
            args: "--target x86_64-apple-darwin --bundles app,dmg"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev patchelf libfuse2

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache-dependency-path: cli/go.sum
          cache: true

      - name: Setup Rust
        if: matrix.rust_target == ''
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Rust target
        if: matrix.rust_target != ''
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target
            src-tauri -> target

      - name: Build and upload desktop bundles
        uses: tauri-apps/tauri-action@action-v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ env.RELEASE_TAG }}
          releaseName: AssetIWeave ${{ env.RELEASE_TAG }}
          releaseBody: |
            AssetIWeave ${{ env.RELEASE_TAG }} release.

            Download the installer for your operating system from the assets below. CLI tools are bundled with the desktop app and can be installed into PATH from Settings. Update artifacts are signed for the in-app updater; macOS and Windows may still show an extra trust prompt until OS code signing is configured.
          releaseDraft: true
          prerelease: false
          generateReleaseNotes: true
          includeUpdaterJson: true
          updaterJsonPreferNsis: true
          args: ${{ matrix.args }}

  publish-release:
    name: Verify and publish release
    needs: desktop-installers
    runs-on: ubuntu-22.04
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Remove non-updater macOS archives
        shell: bash
        run: |
          set -euo pipefail
          gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" --json assets --jq '.assets[].name | select(endswith(".app" + ".zip"))' |
            while IFS= read -r asset; do
              [[ -z "$asset" ]] && continue
              gh release delete-asset "$RELEASE_TAG" "$asset" --repo "$GITHUB_REPOSITORY" --yes
            done

      - name: Download updater manifest
        run: gh release download "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" --pattern latest.json --dir dist

      - name: Verify updater manifest and signatures
        shell: bash
        run: |
          set -euo pipefail
          version="${RELEASE_TAG#v}"
          jq --arg version "$version" -e '
            .version == $version
            and (.platforms["linux-x86_64"].url | length > 0)
            and (.platforms["linux-x86_64"].signature | length > 0)
            and (.platforms["windows-x86_64"].url | length > 0)
            and (.platforms["windows-x86_64"].signature | length > 0)
            and (.platforms["darwin-aarch64"].url | length > 0)
            and (.platforms["darwin-aarch64"].signature | length > 0)
            and (.platforms["darwin-x86_64"].url | length > 0)
            and (.platforms["darwin-x86_64"].signature | length > 0)
          ' dist/latest.json
          signature_count="$(gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" --json assets --jq '[.assets[].name | select(endswith(".sig"))] | length')"
          if (( signature_count < 4 )); then
            echo "::error::Expected at least four updater signature assets, found $signature_count"
            exit 1
          fi
          unsupported_assets="$(gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" --json assets --jq '.assets[].name | select(test("(\\.msi|\\.msi\\.sig|\\.rpm|\\.rpm\\.sig|\\.app\\.zip)$"))')"
          if [[ -n "$unsupported_assets" ]]; then
            echo "::error::Release contains unsupported installer assets:"
            echo "$unsupported_assets"
            exit 1
          fi

      - name: Publish stable release
        run: gh release edit "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" --draft=false --prerelease=false --latest
